<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall AI - Advanced Intelligence</title>
    <style>
        /* آپ کا پریمیم ڈارک ڈیزائن */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; min-height: 100vh; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { color: #00d2ff; margin: 0; font-size: 24px; }
        .header p { font-size: 10px; color: #888; margin-top: 5px; }

        /* سرچ بار اور بٹن */
        .search-container { position: relative; padding: 15px; }
        .search-bar { width: 100%; padding: 15px 50px 15px 15px; border-radius: 25px; border: 1px solid #333; background: #1e1e2f; color: white; box-sizing: border-box; outline: none; }
        .rocket-btn { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 20px; }

        /* AI رسپانس کا ڈبہ */
        .response-container { margin: 10px 20px; padding: 20px; border-radius: 15px; background: rgba(0, 210, 255, 0.1); border: 1px solid #00d2ff; position: relative; min-height: 80px; }
        #aiResponse { font-size: 14px; line-height: 1.6; color: #fff; }
        .speaker-btn { position: absolute; right: 10px; bottom: 10px; background: none; border: none; cursor: pointer; font-size: 22px; transition: 0.3s; }

        /* فیچرز گریڈ */
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .feature-card { background: #161625; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; cursor: pointer; }
        .feature-card i { font-size: 24px; display: block; margin-bottom: 10px; }
        
        /* نیویگیشن بار */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #161625; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { font-size: 22px; color: #888; cursor: pointer; }
        .active { color: #00d2ff; }
        .vip { color: #f1c40f; }

        /* فلوٹنگ ڈائلر */
        .dialer { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, #00d2ff, #3a7bd5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NexCall AI</h1>
        <p>Advanced Intelligence by Bahawal Qazi</p>
    </div>

    <div class="search-container">
        <input type="text" id="userInput" class="search-bar" placeholder="Ask AI anything...">
        <button class="rocket-btn" onclick="askAI()">🚀</button>
    </div>

    <div class="response-container">
        <div id="aiResponse">آپ کا جواب یہاں آئے گا جانی...</div>
        <button class="speaker-btn" onclick="speakText()">🔊</button>
    </div>

    <div class="features-grid">
        <div class="feature-card" onclick="alert('Voice AI coming soon!')">
            <span style="color: #ff4b2b;">🎙️</span>
            <div style="font-size: 12px;">Voice AI</div>
        </div>
        <div class="feature-card" onclick="alert('Gallery Upload coming soon!')">
            <span style="color: #4caf50;">🖼️</span>
            <div style="font-size: 12px;">Gallery</div>
        </div>
    </div>

    <div class="dialer" onclick="alert('Dialer logic connecting...')">📞</div>

    <div class="nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item" onclick="showTab('History')">🕒</div>
        <div class="nav-item" onclick="showTab('Profile')">👤</div>
        <div class="nav-item" onclick="showTab('Chat')">💬</div>
        <div class="nav-item vip">👑</div>
    </div>

    <script>
        // AI سے سوال پوچھنے کا فنکشن
        async function askAI() {
            const input = document.getElementById('userInput').value;
            const resBox = document.getElementById('aiResponse');
            const API_KEY = "AIzaSyDaj6WjWXsDbefqx3s-IbI6Zv5e0UVB22A"; // آپ کی اصلی API Key

            if (!input) return;
            resBox.innerText = "NexCall AI سوچ رہا ہے...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                const data = await response.json();
                resBox.innerText = data.candidates[0].content.parts[0].text;
            } catch (error) {
                resBox.innerText = "کنکشن فیل! انٹرنیٹ چیک کریں جانی۔";
            }
        }

        // آواز میں جواب سنانے کا فنکشن
        function speakText() {
            const text = document.getElementById('aiResponse').innerText;
            if (text && text !== "آپ کا جواب یہاں آئے گا جانی...") {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; 
                window.speechSynthesis.speak(utterance);
            }
        }

        function showTab(name) {
            alert(name + " والا پیج ابھی اپ ڈیٹ ہو رہا ہے جانی!");
        }
    </script>
</body>
</html>
