<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall AI - Bahawal Qazi</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; min-height: 100vh; padding-bottom: 80px; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { color: #00d2ff; margin: 0; font-size: 24px; }
        .search-container { position: relative; padding: 15px; }
        .search-bar { width: 100%; padding: 15px 50px 15px 20px; border-radius: 25px; border: 1px solid #333; background: #1a1a2e; color: white; box-sizing: border-box; }
        .rocket-btn { position: absolute; right: 25px; top: 25px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .response-box { margin: 15px; padding: 20px; background: #16213e; border-radius: 15px; border: 1px solid #00d2ff; min-height: 100px; line-height: 1.6; position: relative; text-align: right; direction: rtl; }
        .speaker-btn { position: absolute; bottom: 10px; right: 10px; background: none; border: none; font-size: 24px; cursor: pointer; opacity: 0.7; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #1a1a2e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { font-size: 20px; cursor: pointer; }
        .active { color: #00d2ff; }
    </style>
</head>
<body>
    <div class="header">
        <h1>NexCall AI</h1>
        <p style="font-size: 10px; color: #888;">Advanced Intelligence by Bahawal Qazi</p>
    </div>

    <div class="search-container">
        <input type="text" id="userInput" class="search-bar" placeholder="کچھ پوچھیں جانی...">
        <button class="rocket-btn" onclick="askAI()">🚀</button>
    </div>

    <div id="aiResponse" class="response-box">
        آپ کا جواب یہاں آئے گا جانی...
        <button class="speaker-btn" onclick="speakText()">🔊</button>
    </div>

    <div class="nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item" onclick="alert('Profile: Bahawal Qazi')">👤</div>
        <div class="nav-item" onclick="alert('Chat History coming soon')">💬</div>
    </div>

    <script>
        // آپ کی نئی API Key یہاں لگا دی ہے جانی
        const API_KEY = "AQ.Ab8RN6L_OnmzV8JJh_WFZ34vgGer9qVSkZQrW5TixpYRNpIwZg";

        async function askAI() {
            const input = document.getElementById('userInput').value;
            const resBox = document.getElementById('aiResponse');
            if (!input) return;
            resBox.innerText = "NexCall AI سوچ رہا ہے...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }] })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    resBox.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resBox.innerText = "جواب نہیں مل سکا، براہ کرم دوبارہ کوشش کریں۔";
                }
            } catch (error) {
                resBox.innerText = "کنکشن فیل! انٹرنیٹ یا API Key چیک کریں جانی۔";
            }
        }

        function speakText() {
            const text = document.getElementById('aiResponse').innerText;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ur-PK';
            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
